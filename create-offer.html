<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Offer</title>

    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

    <header class="dashboard-nav">

        <a href="index.html" class="brand">

            <span class="brand-mark">
                <img src="assets/fh-icon.png" alt="Food Hunt">
            </span>

            Food Hunt

        </a>

        <button class="button button-secondary" onclick="window.location='index.html'">

            ← Back to Dashboard

        </button>

    </header>


    <main class="create-offer-page">

        <section class="create-offer-banner">

            <div class="banner-pill">

                🍽 OFFICE GROUP ORDER

            </div>

            <div class="banner-divider"></div>

            <div class="banner-content">

                <h1>Create Group Order</h1>

                <p>
                    Start a food order for your office and let your colleagues join to share delivery costs.
                </p>

            </div>

        </section>


        <div class="create-offer-layout">

            <section class="create-offer-card">

                <form id="offerForm">

                    <h2 class="form-section-title">
                        Restaurant Information
                    </h2>

                    <!-- Restaurant -->

                    <div class="form-row">

                        <label>
                            Restaurant Name
                            <input type="text" id="restaurantName" required>
                        </label>

                        <label>
                            Food Name
                            <input type="text" id="foodName" required>
                        </label>

                    </div>

                    <label>
                        Food Description
                        <textarea id="foodDescription"></textarea>
                    </label>

                    <div class="form-row">

                        <label>
                            Quantity
                            <input type="number" id="quantity" min="1" required>
                        </label>

                        <label>
                            Maximum Participants
                            <input type="number" id="maxPeople" min="2" required>
                        </label>

                    </div>

                    <div class="form-row">

                        <label>
                            Food Price
                            <input type="number" id="foodPrice" required>
                        </label>

                        <label>
                            Delivery Charge
                            <input type="number" id="deliveryCharge" required>
                        </label>

                    </div>

                    <div class="form-row">

                        <label>
                            Start Date & Time
                            <input type="datetime-local" id="startTime" required>
                        </label>

                        <label>
                            End Date & Time
                            <input type="datetime-local" id="endTime" required>
                        </label>

                    </div>


                    <button type="submit" class="button button-primary create-offer-btn">

                        Create Group Order

                    </button>

                </form>

            </section>

            <aside class="offer-preview">

                <div class="preview-logo">

                    <img id="previewLogo" src="assets/restaurants/default.png" alt="Restaurant">

                </div>

                <h2 id="previewRestaurant">
                    Restaurant Name
                </h2>

                <p id="previewFood" class="preview-food">
                    Food Name
                </p>

                <div class="preview-divider"></div>

                <div class="preview-row">

                    <span>Quantity</span>

                    <strong id="previewQty">0</strong>

                </div>

                <div class="preview-row">

                    <span>Participants</span>

                    <strong>

                        <span id="previewPeople">0</span>

                        People

                    </strong>

                </div>

                <div class="preview-row">

                    <span>Food Price</span>

                    <strong id="previewPrice">

                        ৳0

                    </strong>

                </div>

                <div class="preview-row">

                    <span>Delivery Charge</span>

                    <strong id="previewDelivery">

                        ৳0

                    </strong>

                </div>

                <div class="preview-divider"></div>

                <div class="preview-total">

                    <span>Estimated Per Person</span>

                    <strong id="previewTotal">

                        ৳0

                    </strong>

                </div>

            </aside>

        </div>

    </main>

    <script src="offer.js"></script>

</body>

</html>
