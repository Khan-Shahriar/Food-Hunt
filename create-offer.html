<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Create Offer</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="offer-container">

<h1>Create Group Order</h1>

<form id="offerForm">

<label>Restaurant Name</label>

<input
type="text"
id="restaurantName"
required>

<label>Food Name</label>

<input
type="text"
id="foodName"
required>

<label>Food Description</label>

<textarea
id="foodDescription"></textarea>

<label>Quantity</label>

<input
type="number"
id="quantity"
min="1"
required>

<label>Food Price</label>

<input
type="number"
id="foodPrice"
required>

<label>Delivery Charge</label>

<input
type="number"
id="deliveryCharge"
required>

<label>Start Time</label>

<input
type="time"
id="startTime"
required>

<label>End Time</label>

<input
type="time"
id="endTime"
required>

<label>Maximum Participants</label>

<input
type="number"
id="maxPeople"
min="2"
required>

<button type="submit">

Create Offer

</button>

</form>

</div>

<script src="offer.js"></script>

</body>

</html>
